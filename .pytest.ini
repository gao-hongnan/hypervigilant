# Reference:
# https://github.com/tiangolo/fastapi/blob/master/pyproject.toml
# https://github.com/pydantic/pydantic/blob/main/pyproject.toml
[pytest]
minversion=6.0
pythonpath=.
addopts=
    --strict-config
    --strict-markers
    --import-mode=importlib
testpaths=
    tests/unit
    tests/integration
    tests/circuit_breaker
asyncio_mode=auto
xfail_strict=true
filterwarnings=
    error
    ignore::DeprecationWarning
    ignore::ResourceWarning
markers =
    asyncio: mark test as an async test
    unit: pure-logic test with no I/O or external services
    integration: integration test that may use real services (e.g. Redis via Docker)